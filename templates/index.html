<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dự đoán nhiên liệu xe máy</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(30px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #5a67d8);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #eef2ff;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
        }

        .loader {
            display: none;
            margin-top: 15px;
        }

        .loader div {
            width: 30px;
            height: 30px;
            border: 4px solid #ccc;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🏍️ Fuel Prediction</h2>

    <form method="POST" onsubmit="showLoading()">
        <input type="number" step="any" name="cc" placeholder="Dung tích (CC)" required>
        <input type="number" step="any" name="power" placeholder="Công suất (PS)" required>

        <button type="submit">🚀 Dự đoán</button>
    </form>

    <!-- Loading -->
    <div class="loader" id="loading">
        <div></div>
    </div>

    <!-- Kết quả -->
    {% if result %}
        <div class="result">
            🔥 Tiêu hao: {{ result }} L/100km
        </div>
    {% endif %}

    <footer>
        Random Forest Model | AI Mini Project
    </footer>
</div>

<script>
    function showLoading() {
        document.getElementById("loading").style.display = "block";
    }
</script>

</body>
</html>
